<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDP Airband Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1b2028;
      --panel-2: #242b35;
      --text: #eef2f6;
      --muted: #9aa7b3;
      --line: #394451;
      --accent: #4fb477;
      --warn: #e2a84b;
      --bad: #e15f5f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 750;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 128px;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bad);
    }

    .status.ready .dot {
      background: var(--warn);
    }

    .status.idle .dot {
      background: var(--warn);
      box-shadow: 0 0 0 4px rgb(226 168 75 / 16%);
    }

    .status.live .dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgb(79 180 119 / 18%);
    }

    .controls,
    .meters {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 18px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    button {
      min-width: 132px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:hover {
      border-color: var(--accent);
    }

    .meters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .meter {
      min-height: 90px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #151920;
    }

    .meter span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .meter strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .mode-button {
      width: 100%;
      min-width: 0;
      margin-top: 2px;
    }

    canvas {
      width: 100%;
      height: 180px;
      display: block;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #090b0f;
    }

    .level {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .level span {
      color: var(--muted);
      font-size: 12px;
    }

    .level-track {
      position: relative;
      height: 14px;
      overflow: hidden;
      border-radius: 8px;
      background: linear-gradient(90deg, #4fb477 0%, #4fb477 70%, #e2a84b 70%, #e2a84b 88%, #e15f5f 88%, #e15f5f 100%);
    }

    .level-mask {
      position: absolute;
      inset: 0 0 0 auto;
      width: 100%;
      background: rgb(9 11 15 / 82%);
      transition: width 120ms linear;
    }

    @media (max-width: 720px) {
      header,
      .controls {
        grid-template-columns: 1fr;
        display: grid;
        align-items: stretch;
      }

      .meters {
        grid-template-columns: 1fr;
      }

      .level {
        grid-template-columns: 1fr;
      }

      button,
      .status {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="title">UDP Airband Monitor</h1>
      <div id="status" class="status"><span class="dot"></span><span id="statusText">Disconnected</span></div>
    </header>

    <section class="controls">
      <label>
        Gain <output id="gainValue">100%</output>
        <input id="gain" type="range" min="0" max="3" step="0.01" value="1">
      </label>
      <button id="start">Start Audio</button>
    </section>

    <section class="meters">
      <div class="meter"><span>Buffered</span><strong id="buffered">0 ms</strong></div>
      <div class="meter"><span>Bandwidth</span><strong id="browserBandwidth">0 bps</strong></div>
      <div class="meter"><span>Last Heard Time</span><strong id="lastHeard">never</strong></div>
      <div class="meter"><span>Mode</span><button id="mode" class="mode-button" type="button">RAW</button></div>
    </section>

    <canvas id="scope" width="1200" height="240" aria-label="waveform scope"></canvas>
    <section class="level" aria-label="audio level">
      <span>Level</span>
      <div class="level-track"><div id="levelMask" class="level-mask"></div></div>
      <span id="levelValue">-∞ dB</span>
    </section>
  </main>

  <script>
    const startButton = document.getElementById('start');
    const gainInput = document.getElementById('gain');
    const gainValue = document.getElementById('gainValue');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const bufferedEl = document.getElementById('buffered');
    const browserBandwidthEl = document.getElementById('browserBandwidth');
    const lastHeardEl = document.getElementById('lastHeard');
    const modeButton = document.getElementById('mode');
    const levelMaskEl = document.getElementById('levelMask');
    const levelValueEl = document.getElementById('levelValue');
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');

    let audioContext;
    let gainNode;
    let config = { sampleRate: 8000, channels: 1 };
    let queuedFrames = 0;
    const targetLatencySeconds = 0.25;
    let nextPlayTime = 0;
    let gain = Number(gainInput.value);
    let lastPeak = 0;
    let latestWave = new Float32Array(0);
    let lastUdpAt = 0;
    let lastAudioAt = 0;
    let wsGeneration = 0;
    let controlWs;
    let rawWs;
    let opusAudio;
    let currentMode = 'raw';
    let preferredMode = isMobileDevice() ? 'opus' : 'raw';
    let opusAvailable = false;
    let audioStarted = false;
    let muted = false;
    const clientId = getClientId();
    const streamName = location.pathname.replace(/^\/+|\/+$/g, '');

    gainInput.addEventListener('input', () => {
      gain = Number(gainInput.value);
      gainValue.value = `${Math.round(gain * 100)}%`;
      applyOutputGain();
    });

    modeButton.addEventListener('click', () => {
      preferredMode = currentMode === 'raw' ? 'opus' : 'raw';
      if (audioContext) startSelectedMode();
      updateModeButton();
    });

    startButton.addEventListener('click', async () => {
      if (audioStarted) {
        muted = !muted;
        applyOutputGain();
        updateAudioButton();
        return;
      }

      if (!audioContext) {
        audioContext = new AudioContext();
        gainNode = audioContext.createGain();
        applyOutputGain();
        gainNode.connect(audioContext.destination);
        nextPlayTime = audioContext.currentTime + targetLatencySeconds;
      }

      await audioContext.resume();
      connectControlWebSocket();
      startSelectedMode();
      audioStarted = true;
      updateAudioButton();
      setStatus('ready', 'Waiting for UDP');
    });

    function applyOutputGain() {
      if (gainNode) gainNode.gain.value = muted ? 0 : gain;
      if (opusAudio) opusAudio.muted = muted;
    }

    function updateAudioButton() {
      startButton.textContent = muted ? 'Unmute' : 'Mute';
      startButton.disabled = false;
    }

    function connectControlWebSocket() {
      if (controlWs && controlWs.readyState <= 1) return;

      const generation = ++wsGeneration;
      controlWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/${encodeURIComponent(streamName)}/control?clientId=${encodeURIComponent(clientId)}`);

      controlWs.addEventListener('open', () => {
        if (generation === wsGeneration) setStatus('ready', 'Connected');
      });
      controlWs.addEventListener('close', () => {
        if (generation === wsGeneration) {
          setStatus('', 'Disconnected');
          setTimeout(connectControlWebSocket, 1000);
        }
      });
      controlWs.addEventListener('message', (event) => {
        if (typeof event.data === 'string') {
          const message = JSON.parse(event.data);
          if (message.type === 'config') {
            config = message;
            opusAvailable = Boolean(message.opusAvailable);
            document.title = `${message.label} - UDP Airband Monitor`;
            document.getElementById('title').textContent = message.label;
            if (audioContext && preferredMode === 'opus' && opusAvailable && currentMode !== 'opus') {
              startSelectedMode();
            }
            updateModeButton();
          } else if (message.type === 'stats') {
            browserBandwidthEl.textContent = formatBandwidth(message.listenerBitsPerSecond || 0);
            lastUdpAt = message.lastUdpAt || 0;
          }
        }
      });
    }

    function startSelectedMode() {
      if (preferredMode === 'opus' && opusAvailable) {
        startOpus();
      } else {
        startRaw();
      }
      updateModeButton();
    }

    function startRaw() {
      stopOpus();
      if (rawWs && rawWs.readyState <= 1) return;

      rawWs = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/${encodeURIComponent(streamName)}/audio?clientId=${encodeURIComponent(clientId)}`);
      rawWs.binaryType = 'arraybuffer';
      rawWs.addEventListener('close', () => {
        if (currentMode === 'raw') setTimeout(startRaw, 1000);
      });
      rawWs.addEventListener('message', (event) => {
        const samples = new Float32Array(event.data);
        const frames = samples.length / config.channels;
        if (!Number.isInteger(frames)) return;

        scheduleAudio(samples, frames);
        latestWave = samples;
        lastPeak = Math.max(lastPeak * 0.92, peakOf(samples));
        lastAudioAt = Date.now();
        setStatus('live', 'Live');
      });
      currentMode = 'raw';
    }

    function startOpus() {
      stopRaw();
      if (!opusAudio) {
        opusAudio = new Audio();
        opusAudio.preload = 'none';
        opusAudio.muted = muted;
        opusAudio.addEventListener('playing', () => setStatus('live', 'Live'));
        opusAudio.addEventListener('waiting', () => setStatus('idle', 'Idle'));
        opusAudio.addEventListener('error', () => setStatus('', 'OPUS unavailable'));
      }
      opusAudio.muted = muted;
      opusAudio.src = `/${encodeURIComponent(streamName)}/opus?clientId=${encodeURIComponent(clientId)}&t=${Date.now()}`;
      opusAudio.play().catch(() => setStatus('', 'OPUS unavailable'));
      currentMode = 'opus';
    }

    function stopRaw() {
      if (rawWs) {
        rawWs.onclose = null;
        rawWs.close();
        rawWs = null;
      }
    }

    function stopOpus() {
      if (opusAudio) {
        opusAudio.pause();
        opusAudio.removeAttribute('src');
        opusAudio.load();
      }
    }

    function updateModeButton() {
      modeButton.textContent = currentMode === 'opus' ? 'OPUS' : 'RAW';
      modeButton.disabled = !opusAvailable;
      modeButton.title = opusAvailable ? 'Switch RAW/OPUS' : 'OPUS needs ffmpeg on the server';
      if (!opusAvailable && currentMode === 'raw') {
        modeButton.textContent = 'RAW';
      }
    }

    function scheduleAudio(samples, frames) {
      if (!audioContext || !gainNode) return;

      const now = audioContext.currentTime;
      if (nextPlayTime < now + 0.05 || nextPlayTime > now + 1.0) {
        nextPlayTime = now + targetLatencySeconds;
      }

      const buffer = audioContext.createBuffer(config.channels, frames, config.sampleRate);
      for (let channel = 0; channel < config.channels; channel += 1) {
        const data = buffer.getChannelData(channel);
        for (let i = 0; i < frames; i += 1) {
          data[i] = samples[i * config.channels + channel];
        }
      }

      const source = audioContext.createBufferSource();
      const sourceGain = audioContext.createGain();
      source.buffer = buffer;
      source.connect(sourceGain);
      sourceGain.connect(gainNode);
      applyResumeFade(sourceGain, nextPlayTime);
      source.start(nextPlayTime);
      nextPlayTime += buffer.duration;
      queuedFrames = Math.max(0, Math.round((nextPlayTime - now) * config.sampleRate));
    }

    function applyResumeFade(sourceGain, startTime) {
      const idleMs = Date.now() - lastAudioAt;
      if (!lastAudioAt || idleMs < 900) {
        sourceGain.gain.setValueAtTime(1, startTime);
        return;
      }

      sourceGain.gain.setValueAtTime(0, startTime);
      sourceGain.gain.linearRampToValueAtTime(1, startTime + 0.08);
    }

    function peakOf(samples) {
      let peak = 0;
      for (let i = 0; i < samples.length; i += 1) {
        const value = Math.abs(samples[i]);
        if (value > peak) peak = value;
      }
      return peak;
    }

    function formatBandwidth(bitsPerSecond) {
      if (bitsPerSecond >= 1_000_000) return `${(bitsPerSecond / 1_000_000).toFixed(2)} Mbps`;
      if (bitsPerSecond >= 1_000) return `${(bitsPerSecond / 1_000).toFixed(1)} kbps`;
      return `${Math.round(bitsPerSecond)} bps`;
    }

    function updateLastHeard() {
      if (!lastUdpAt) {
        lastHeardEl.textContent = 'never';
        return;
      }

      const elapsedMs = Math.max(0, Date.now() - lastUdpAt);
      lastHeardEl.textContent = elapsedMs < 3000 ? 'Now' : formatLastHeardTime(lastUdpAt);

      if (controlWs && controlWs.readyState === WebSocket.OPEN && elapsedMs > 1200) {
        setStatus('idle', 'Idle');
      }
    }

    function formatLastHeardTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });
    }

    function updateLevelMeter() {
      const db = lastPeak > 0 ? 20 * Math.log10(lastPeak) : -60;
      const clamped = Math.max(-60, Math.min(0, db));
      const percent = (clamped + 60) / 60 * 100;
      levelMaskEl.style.width = `${100 - percent}%`;
      levelValueEl.textContent = db <= -60 ? '-∞ dB' : `${db.toFixed(1)} dB`;
    }

    function setStatus(state, text) {
      statusEl.className = `status ${state}`;
      statusText.textContent = text;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#394451';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();

      ctx.strokeStyle = '#4fb477';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const step = Math.max(1, Math.floor(latestWave.length / canvas.width));
      for (let x = 0; x < canvas.width; x += 1) {
        const sample = latestWave[x * step * config.channels] || 0;
        const y = canvas.height / 2 - Math.max(-1, Math.min(1, sample * gain)) * canvas.height * 0.45;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      if (controlWs && controlWs.readyState === WebSocket.OPEN && lastUdpAt && Date.now() - lastUdpAt > 1200) {
        setStatus('idle', 'Idle');
      }
      lastPeak *= 0.985;
      updateLevelMeter();
      requestAnimationFrame(draw);
    }
    draw();
    setInterval(updateBuffered, 500);
    setInterval(updateLastHeard, 500);

    function updateBuffered() {
      if (currentMode === 'opus') {
        bufferedEl.textContent = 'streaming';
        return;
      }
      if (audioContext) {
        queuedFrames = Math.max(0, Math.round((nextPlayTime - audioContext.currentTime) * config.sampleRate));
      }
      const bufferedMs = config.sampleRate ? Math.round(queuedFrames / config.sampleRate * 1000) : 0;
      bufferedEl.textContent = `${bufferedMs} ms`;
    }

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    }

    function getClientId() {
      const key = 'udp-airband-client-id';
      let value = localStorage.getItem(key);
      if (!value) {
        value = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
        localStorage.setItem(key, value);
      }
      return value;
    }
  </script>
</body>
</html>
