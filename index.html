<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UDP Airband Monitor</title>
  <link rel="icon" href="/assets/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <header>
      <h1><a id="title" class="stream-title-link" href="/" title="Click to return home">UDP Airband Monitor</a><span id="titleStatusDot" class="title-status-dot" aria-hidden="true"></span></h1>
      <div class="header-status">
        <div class="active-users"><span data-i18n="users">Users</span><strong id="activeUsers">0</strong></div>
        <button id="status" class="status" type="button"><span class="dot"></span><span id="statusText">Disconnected</span></button>
        <div class="language-switch">
          <button id="languageToggle" class="language-button" type="button" aria-haspopup="true" aria-expanded="false">
            <span id="languageCode">EN</span><span class="caret"></span>
          </button>
          <div id="languageMenu" class="language-menu" hidden>
            <button class="language-option" type="button" data-lang="en"><span class="language-radio"></span><span>English - EN</span></button>
            <button class="language-option" type="button" data-lang="es"><span class="language-radio"></span><span>Espanol - ES</span></button>
          </div>
        </div>
      </div>
    </header>

    <section class="meters">
      <div class="meter"><span data-i18n="buffered">Buffered</span><strong id="buffered">0 ms</strong></div>
      <div class="meter"><span data-i18n="bandwidth">Bandwidth</span><strong id="browserBandwidth">0 bps</strong></div>
      <div class="meter"><span data-i18n="lastHeardTime">Last Heard Time</span><strong id="lastHeard">never</strong></div>
      <div class="meter mode-meter">
        <span data-i18n="mode">Mode</span>
        <button id="mode" class="mode-button" type="button" aria-haspopup="true" aria-expanded="false">Uncompressed</button>
        <div id="modeMenu" class="mode-menu" hidden>
          <button class="mode-option" type="button" data-mode-option="raw">Uncompressed</button>
          <button class="mode-option" type="button" data-mode-option="opus">Compressed</button>
          <button class="mode-option" type="button" data-mode-option="compatible">Compatible</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <label id="gainLabel">
        <span><span data-i18n="gain">Gain</span> <output id="gainValue">100%</output></span>
        <input id="gain" type="range" min="0" max="1.5" step="0.01" value="1">
      </label>
      <button id="start">Start Audio</button>
    </section>

    <canvas id="scope" width="1200" height="240" aria-label="waveform scope"></canvas>
    <section class="level" aria-label="audio level">
      <span data-i18n="level">Level</span>
      <div class="level-track"><div id="levelMask" class="level-mask"></div></div>
      <span id="levelValue">-&infin; dB</span>
    </section>

    <footer class="time-footer" aria-label="current time">
      <div class="time-box"><span data-i18n="localTime">Local Time</span><strong id="localTime">--:--:--</strong></div>
      <div class="time-box"><span>UTC</span><strong id="utcTime">--:--:--</strong></div>
    </footer>
    <footer class="project-footer">
      <a href="https://github.com/OA6DXV/udp-airband-server" rel="noopener noreferrer">UDP Airband Server __SOFTWARE_VERSION__</a>
    </footer>
  </main>

  <div id="modeNoticeOverlay" class="multi-start-overlay" hidden>
    <section class="multi-mode-notice" role="dialog" aria-modal="true" aria-labelledby="modeNoticeTitle">
      <h2 id="modeNoticeTitle">Compatible Mode</h2>
      <p id="modeNoticeBody"></p>
      <button id="modeNoticeAccept" class="multi-start-button" type="button">Accept</button>
    </section>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
